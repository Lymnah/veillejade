        pourquoi:"Rôle de référent·e / responsable de situation (composante encadrement et coordination réseau, proche de l'axe formation de Jade). Conditions de vie favorables : horaires principalement de journée (7h–17h), 5 à 6 semaines de vacances, CCT parapublique, formation continue AVASAD ; taux flexible 60–100% compatible temps partiel, à Renens (proche Lausanne/Morges).",
        vigilance:"Soins à domicile (CMS), hors cœur métier pédiatrie/soins aigus. Avis salariés évoquant un salaire moyen et une communication interne perfectible.",
        ethique:"good", ethiqueTxt:"Aucun élément notable trouvé (structure parapublique reconnue d'aide et soins à domicile vaudoise).",
        repute:{note:null, avis:"mitigés", source:"Indeed / jobup", statut:"attention", txt:"Avis AVASAD mitigés : management humain et reconnaissance cités positivement, mais salaire et communication critiqués. Pas de note chiffrée fiable."}
      }
    ]
  }
];

/* FIN DONNÉES */
/* ====================================================================== */

const STAT = {positif:["d-good","Réputation positive"],attention:["d-warn","Point d'attention"],
  incertain:["d-na","Réputation incertaine"],exclu:["d-exclu","Exclu"]};
const ETH = {good:["d-good","Éthique : RAS"],warn:["d-warn","Point éthique signalé"],na:["d-na","Non vérifiable"]};

function card(o, isNew){
  const tags=(o.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
  const r=o.repute||{}; const rs=STAT[r.statut]||STAT.incertain;
  const repute = r.note!=null || r.statut
    ? `<span class="pill"><span class="dot ${rs[0]}"></span>${r.source||"Avis"} ${r.note!=null?r.note+"/5":""} ${r.avis?"("+r.avis+" avis)":""}</span>` : "";
  let eth="";
  if(isNew && o.ethique){const e=ETH[o.ethique]||ETH.na;
    eth=`<span class="pill"><span class="dot ${e[0]}"></span>${o.ethiqueTxt||e[1]}</span>`;}
  return `<div class="card">
    <div class="top">
      <div>
        <h3><a href="${o.lien||'#'}" target="_blank" rel="noopener">${o.titre||"—"}</a></h3>
        <div class="co">${o.entreprise||""}</div>
      </div>
      <div class="score">${o.note!=null?o.note:"—"}</div>
    </div>
    ${tags?`<div class="tags">${tags}</div>`:""}
    ${isNew&&o.pourquoi?`<div class="why">${o.pourquoi}</div>`:""}
    <div class="row">
      <span>📍 ${o.lieu||"—"}</span>
      ${o.taux?`<span>⏱️ ${o.taux}</span>`:""}
      ${o.date?`<span>🗓️ ${o.date}</span>`:""}
      ${repute}
      ${eth}
    </div>
    ${isNew&&o.vigilance?`<div class="vig">⚠️ ${o.vigilance}</div>`:""}
  </div>`;
}

function render(){
  document.getElementById("meta").textContent = GENERATED;
  const n=document.getElementById("list-new"), a=document.getElementById("list-old");
  n.innerHTML = NOUVELLES.length
    ? NOUVELLES.map(o=>card(o,true)).join("")
    : `<div class="empty"><div class="big">🍼</div>Aucune nouvelle offre pour l'instant.<br>La première veille s'exécutera au prochain run planifié.</div>`;
  a.innerHTML = ANCIENNES.length
    ? ANCIENNES.map(g=>{
        const jour=(g.jour||"").replace(/-/g,"/");
        const offres=(g.offres||[]).map(o=>card(o,false)).join("");
        return `<h2 class="day">${jour}</h2>${offres}`;
      }).join("")
    : `<div class="empty"><div class="big">📂</div>Pas encore d'historique.</div>`;
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const nw=t.dataset.tab==="new";
  document.getElementById("list-new").style.display=nw?"":"none";
  document.getElementById("list-old").style.display=nw?"none":"";
}));
render();
</script>
</body>
</html>
