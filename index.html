<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille d'offres — Jade</title>
<style>
  :root{
    --bg:#f5f8fa; --card:#ffffff; --ink:#1c2a33; --muted:#5e7180;
    --line:#e3eaee; --accent:#0a9396; --accent-d:#066a6c; --soft:#e8f4f4;
    --good:#2a9d50; --warn:#c9821a; --na:#8896a0; --exclu:#c0392b;
    --shadow:0 1px 3px rgba(20,50,60,.08),0 6px 20px rgba(20,50,60,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;font-size:15px}
  header{background:linear-gradient(120deg,var(--accent-d),var(--accent));color:#fff;
    padding:26px 22px 20px}
  header h1{margin:0;font-size:21px;font-weight:650;letter-spacing:.2px}
  header .sub{opacity:.9;font-size:13px;margin-top:4px}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 60px}
  .tabs{display:flex;gap:6px;margin:18px 0 4px;position:sticky;top:0;
    background:var(--bg);padding:10px 0;z-index:5}
  .tab{border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:9px 16px;border-radius:999px;cursor:pointer;font-size:14px;font-weight:550}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .meta{font-size:12.5px;color:var(--muted);margin:2px 2px 14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .card h3{margin:0;font-size:16.5px;font-weight:640}
  .card h3 a{color:var(--ink);text-decoration:none}
  .card h3 a:hover{color:var(--accent-d);text-decoration:underline}
  .co{color:var(--muted);font-size:13.5px;margin-top:3px}
  .score{flex:none;background:var(--soft);color:var(--accent-d);font-weight:700;
    border-radius:10px;padding:7px 11px;font-size:15px;min-width:52px;text-align:center}
  .tags{margin:11px 0 0;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:#eef3f5;color:#42606e;border-radius:6px;padding:3px 9px;font-size:11.5px}
  .why{margin:11px 0 0;font-size:13.8px}
  .row{margin-top:9px;font-size:12.8px;display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .d-good{background:var(--good)}.d-warn{background:var(--warn)}
  .d-na{background:var(--na)}.d-exclu{background:var(--exclu)}
  .vig{margin-top:9px;font-size:12.8px;color:var(--warn)}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;
    background:var(--card);border:1px dashed var(--line);border-radius:14px}
  .empty .big{font-size:34px;margin-bottom:8px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px}
  h2.day{font-size:13px;font-weight:650;color:var(--accent-d);text-transform:none;
    margin:22px 2px 10px;padding-bottom:6px;border-bottom:1px solid var(--line);letter-spacing:.3px}
  h2.day:first-child{margin-top:4px}
</style>
</head>
<body>

  <h1>🩺 Veille d'offres — Jade</h1>

</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="new">Nouvelles offres</button>
    <button class="tab" data-tab="old">Anciennes offres</button>
  </div>
  <div class="meta" id="meta"></div>
  <div id="list-new"></div>
  <div id="list-old" style="display:none"></div>
</div>

<footer>Généré automatiquement — routine <code>veille-infirmiere-jade</code></footer>

    vigilance:"Taux 80–100% (au-dessus de la fourchette idéale 50–80%) et horaires en 12h. Délai de postulation indiqué au 16 juin 2026 — à vérifier, car il peut être déjà échu.",

  },
  {
    note: 7.8, titre:"Chargé·e de formation — programme d'études postdiplômes en soins intensifs",
    entreprise:"CHUV", lieu:"Lausanne", taux:"100%", date:"2026-06-11", dateProp:"2026-06-16",
    lien:"https://www.jobup.ch/fr/emplois/detail/90d0e789-0509-429d-be95-af8089b49895/",
    tags:["Formation / praticienne formatrice","Soins intensifs","CHUV","CDI"],
    pourquoi:"Trouvée via le navigateur (CHUV) : croise parfaitement les deux axes de Jade — sa formation (CAS de praticienne formatrice) et son expérience en soins intensifs (renforts SI COVID au CHUV). Poste d'enseignement au sein du programme post-diplôme SI, dans son ancienne institution. Angle d'accroche : mettre en avant « CAS praticienne formatrice + pratique réflexive développée en SI au CHUV ».",
    vigilance:"Taux 100% (au-dessus de la fourchette 50–80%). Rôle d'enseignement/ingénierie de formation plus que de soins au lit du patient ; exige probablement une expérience SI confirmée et/ou un titre de formation.",
    ethique:"good", ethiqueTxt:"Aucun élément notable trouvé.",
    repute:{note:3.5, avis:"plusieurs", source:"emploi-infirmier / Indeed", statut:"positif", txt:"CHUV ~3,5/5 ; grande institution publique, conditions et formation continue reconnues."}
  },
  {
    note: 7.2, titre:"Infirmier·ère Clinicien·ne Spécialisé·e",
    entreprise:"Fondation La Rozavère", lieu:"Lausanne (Rovéréaz)", taux:"80–100%", date:"2026-06-08", dateProp:"2026-06-16",

  {

    pourquoi:"Trouvée via le navigateur (CHUV). Unité de réhabilitation, proche des 3 ans de Jade en neuroréhabilitation adulte au CHUV ; environnement interdisciplinaire qu'elle connaît bien.",

    ethique:"good", ethiqueTxt:"Aucun élément notable trouvé.",

  },
  {
    note: 6.3, titre:"Infirmier·ère chef·fe d'Unité de soins — soins continus de médecine interne",
    entreprise:"CHUV", lieu:"Lausanne", taux:"à définir", date:"2026-06-15", dateProp:"2026-06-16",
    lien:"https://www.jobup.ch/fr/emplois/detail/925273cf-d31e-43a4-9581-e508dd7d9b3b/",

    pourquoi:"Trouvée via le navigateur (CHUV), publiée hier. Rôle d'encadrement (cheffe d'unité), dans le prolongement de son axe formation/management et de son expérience de responsabilité d'étage.",
    vigilance:"Poste de cheffe d'unité : exige une expérience managériale confirmée. Médecine interne adulte, hors pédiatrie ; taux non précisé.",
    ethique:"good", ethiqueTxt:"Aucun élément notable trouvé.",
    repute:{note:3.5, avis:"plusieurs", source:"emploi-infirmier / Indeed", statut:"positif", txt:"CHUV ~3,5/5."}
  },
  {
    note: 6.2, titre:"Infirmier·ère référent·e somatique (60-100%) — CMS de Renens",
    entreprise:"APREMADOL (réseau AVASAD)", lieu:"Renens VD (Ouest lausannois)", taux:"60–100%", date:"2026-06-15", dateProp:"2026-06-16",
    lien:"https://www.jobup.ch/fr/emplois/detail/1f22af81-3e4f-4b5b-92d5-8d903429705c/",
    tags:["Référent·e / responsable de situation","Soins à domicile","Horaires de journée","CDI"],
    pourquoi:"Rôle de référent·e / responsable de situation (composante encadrement et coordination réseau, proche de l'axe formation de Jade). Conditions de vie favorables : horaires principalement de journée (7h–17h), 5 à 6 semaines de vacances, CCT parapublique, formation continue AVASAD ; taux flexible 60–100% compatible temps partiel, à Renens (proche Lausanne/Morges).",
    vigilance:"Soins à domicile (CMS), hors cœur métier pédiatrie/soins aigus. Avis salariés évoquant un salaire moyen et une communication interne perfectible.",
    ethique:"good", ethiqueTxt:"Aucun élément notable trouvé (structure parapublique reconnue d'aide et soins à domicile vaudoise).",
    repute:{note:null, avis:"mitigés", source:"Indeed / jobup", statut:"attention", txt:"Avis AVASAD mitigés : management humain et reconnaissance cités positivement, mais salaire et communication critiqués. Pas de note chiffrée fiable."}
  }
];

/* ANCIENNES = offres des JOURS PRÉCÉDENTS uniquement (dateProp < aujourd'hui),
   regroupées par jour de proposition. Une offre proposée AUJOURD'HUI reste dans
   NOUVELLES, même lors de plusieurs runs le même jour ; elle ne bascule ici que
   le lendemain. Structure : [{jour:"AAAA-MM-JJ", offres:[ {…mêmes champs…}, … ]}, …],
   jour le plus récent en premier, offres triées par note décroissante dans chaque jour. */
const ANCIENNES = [
  /* Aucun historique antérieur pour l'instant. */
];

/* FIN DONNÉES */
/* ====================================================================== */

const STAT = {positif:["d-good","Réputation positive"],attention:["d-warn","Point d'attention"],
  incertain:["d-na","Réputation incertaine"],exclu:["d-exclu","Exclu"]};
const ETH = {good:["d-good","Éthique : RAS"],warn:["d-warn","Point éthique signalé"],na:["d-na","Non vérifiable"]};

function card(o, isNew){
  const tags=(o.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
  const r=o.repute||{}; const rs=STAT[r.statut]||STAT.incertain;
  const repute = r.note!=null || r.statut
    ? `<span class="pill"><span class="dot ${rs[0]}"></span>${r.source||"Avis"} ${r.note!=null?r.note+"/5":""} ${r.avis?"("+r.avis+" avis)":""}</span>` : "";
  let eth="";
  if(isNew && o.ethique){const e=ETH[o.ethique]||ETH.na;
    eth=`<span class="pill"><span class="dot ${e[0]}"></span>${o.ethiqueTxt||e[1]}</span>`;}
  return `<div class="card">
    <div class="top">
      <div>
        <h3><a href="${o.lien||'#'}" target="_blank" rel="noopener">${o.titre||"—"}</a></h3>
        <div class="co">${o.entreprise||""}</div>
      </div>
      <div class="score">${o.note!=null?o.note:"—"}</div>
    </div>
    ${tags?`<div class="tags">${tags}</div>`:""}
    ${isNew&&o.pourquoi?`<div class="why">${o.pourquoi}</div>`:""}
    <div class="row">
      <span>📍 ${o.lieu||"—"}</span>
      ${o.taux?`<span>⏱️ ${o.taux}</span>`:""}
      ${o.date?`<span>🗓️ ${o.date}</span>`:""}
      ${repute}
      ${eth}
    </div>
    ${isNew&&o.vigilance?`<div class="vig">⚠️ ${o.vigilance}</div>`:""}
  </div>`;
}

function render(){
  document.getElementById("meta").textContent = GENERATED;
  const n=document.getElementById("list-new"), a=document.getElementById("list-old");
  n.innerHTML = NOUVELLES.length
    ? NOUVELLES.map(o=>card(o,true)).join("")
    : `<div class="empty"><div class="big">🍼</div>Aucune nouvelle offre pour l'instant.<br>La première veille s'exécutera au prochain run planifié.</div>`;
  a.innerHTML = ANCIENNES.length
    ? ANCIENNES.map(g=>{
        const jour=(g.jour||"").replace(/-/g,"/");
        const offres=(g.offres||[]).map(o=>card(o,false)).join("");
        return `<h2 class="day">${jour}</h2>${offres}`;
      }).join("")
    : `<div class="empty"><div class="big">📂</div>Pas encore d'historique.</div>`;
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const nw=t.dataset.tab==="new";
  document.getElementById("list-new").style.display=nw?"":"none";
  document.getElementById("list-old").style.display=nw?"none":"";
}));
render();
</script>
</body>
</html>
